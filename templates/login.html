<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CTTO Identity Gateway</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f1f5f9;
      --panel: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #0f4c81;
      --primary-dark: #0b3b64;
      --border: #dbe4ef;
      --error-bg: #fff1f2;
      --error-border: #fecdd3;
      --error-text: #be123c;
      --shadow: 0 18px 36px rgba(15, 23, 42, 0.10);
    }

    body {
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      background:
        radial-gradient(900px 420px at 8% 0%, #dbeafe 0%, transparent 70%),
        radial-gradient(900px 420px at 100% 100%, #e2e8f0 0%, transparent 72%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem 2rem 1.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow);
    }

    .logo {
      text-align: center;
      margin-bottom: 1.3rem;
    }

    .logo-mark {
      width: 54px;
      height: 54px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      background: linear-gradient(145deg, #e0ecff, #c6defd);
      border: 1px solid #bfd6f6;
    }

    .logo svg { width: 28px; height: 28px; fill: var(--primary); }

    .logo h1 {
      font-size: 1.18rem;
      font-weight: 700;
      margin-top: 0.75rem;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    .logo p {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .alert {
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      border-radius: 6px;
      color: var(--error-text);
      font-size: 0.86rem;
      padding: 0.65rem 0.85rem;
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.82rem;
      color: #334155;
      margin-bottom: 0.34rem;
      margin-top: 0.95rem;
      font-weight: 600;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: #ffffff;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      color: #0f172a;
      font-size: 0.95rem;
      padding: 0.62rem 0.75rem;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    input::placeholder { color: #94a3b8; }

    input:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    button[type="submit"] {
      margin-top: 1.25rem;
      width: 100%;
      background: linear-gradient(180deg, var(--primary), var(--primary-dark));
      border: 1px solid #0a3558;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      padding: 0.65rem;
      transition: transform 0.05s ease, filter 0.15s ease;
    }

    button[type="submit"]:hover { filter: brightness(1.05); }
    button[type="submit"]:active { transform: translateY(1px); }

    .meta {
      margin-top: 0.95rem;
      color: #64748b;
      font-size: 0.76rem;
      line-height: 1.4;
      text-align: center;
    }

    .footer {
      text-align: center;
      font-size: 0.72rem;
      color: #94a3b8;
      margin-top: 1.2rem;
      border-top: 1px solid #e2e8f0;
      padding-top: 0.9rem;
    }

    @media (max-width: 480px) {
      .card { padding: 1.35rem 1rem 1rem; }
      .logo h1 { font-size: 1.05rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 2L4 5v6c0 5.1 3.53 9.87 8 11 4.47-1.13 8-5.9 8-11V5l-8-3zm0 4a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5zm0 6.5c2.2 0 4.5 1.1 4.5 2.5v1H7.5v-1c0-1.4 2.3-2.5 4.5-2.5z"/>
        </svg>
      </div>
      <h1>CTTO Identity Gateway</h1>
      <p>Enterprise Authentication Portal</p>
    </div>

    {% if error %}
    <div class="alert">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login" autocomplete="off">
      <label for="username">Username</label>
      <input type="text" id="username" name="username"
             placeholder="Enter corporate username" required autofocus />

      <label for="password">Password</label>
      <input type="password" id="password" name="password"
             placeholder="Enter account password" required />

      <button type="submit">Sign In</button>

      <p class="meta">For authorised personnel only. Access is monitored and logged.</p>
    </form>

    <p class="footer">Need help? Contact Security Operations.</p>
  </div>
</body>
</html>
